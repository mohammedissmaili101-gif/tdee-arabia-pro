<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDEE Arabia | حاسبة السعرات والماكروز الاحترافية 2026</title>
    <meta name="description" content="أدق حاسبة TDEE وماكروز للسوق العربي. احسب سعراتك بدقة 100% مع نظام توليد محتوى تلقائي للرياضيين.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; }
        .glass { background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(90deg, #2563eb, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen">
    <header class="glass sticky top-0 z-50 shadow-md">
        <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white font-black">🔥</div>
                <span class="text-2xl font-black gradient-text">TDEE ARABIA</span>
            </div>
            <div class="hidden md:flex gap-6 font-bold text-sm">
                <a href="#calc" class="hover:text-blue-600">الحاسبة</a>
                <a href="#articles" class="hover:text-blue-600">دليل التغذية</a>
                <a href="#about" class="hover:text-blue-600">حول</a>
            </div>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <section id="calc" class="glass rounded-3xl p-8 shadow-2xl border-2 border-blue-100">
            <h1 class="text-3xl font-black text-center mb-8">احسب سعراتك والماكروز بدقة 🚀</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div><label class="block font-bold mb-2">الوزن (كجم)</label><input type="number" id="weight" class="w-full p-4 rounded-xl border-2 outline-none focus:border-blue-500" placeholder="80"></div>
                <div><label class="block font-bold mb-2">الطول (سم)</label><input type="number" id="height" class="w-full p-4 rounded-xl border-2 outline-none focus:border-blue-500" placeholder="180"></div>
                <div><label class="block font-bold mb-2">العمر</label><input type="number" id="age" class="w-full p-4 rounded-xl border-2 outline-none focus:border-blue-500" placeholder="25"></div>
                <div><label class="block font-bold mb-2">الجنس</label><select id="gender" class="w-full p-4 rounded-xl border-2 outline-none"><option value="male">ذكر</option><option value="female">أنثى</option></select></div>
            </div>
            <label class="block font-bold mb-2">مستوى النشاط</label>
            <select id="activity" class="w-full p-4 rounded-xl border-2 mb-8 outline-none">
                <option value="1.2">خامل (بدون تمرين)</option>
                <option value="1.55">نشاط متوسط (3-5 أيام)</option>
                <option value="1.9">نشاط عالٍ (رياضي)</option>
            </select>
            <button onclick="calculate()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl text-xl shadow-lg hover:scale-[1.01] transition-all">تحليل البيانات 🔥</button>

            <div id="results" class="hidden mt-8 p-6 bg-blue-50 rounded-2xl border-2 border-blue-200">
                <div class="text-center mb-6">
                    <p class="font-bold text-blue-600">سعراتك اليومية</p>
                    <div class="text-5xl font-black" id="res-tdee">0</div>
                </div>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div class="bg-white p-3 rounded-lg"><p class="text-xs font-bold">بروتين</p><div id="p-prot" class="font-black text-blue-600">0</div></div>
                    <div class="bg-white p-3 rounded-lg"><p class="text-xs font-bold">دهون</p><div id="p-fat" class="font-black text-blue-600">0</div></div>
                    <div class="bg-white p-3 rounded-lg"><p class="text-xs font-bold">كارب</p><div id="p-carb" class="font-black text-blue-600">0</div></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="glass mt-12 py-8 text-center text-xs font-bold">
        <p>&copy; 2026 FocusHive - TDEE ARABIA</p>
        <div class="mt-2 text-blue-600"><a href="#">الخصوصية</a> | <a href="#">الشروط</a></div>
    </footer>

    <script>
        function calculate() {
            const w = parseFloat(document.getElementById('weight').value);
            const h = parseFloat(document.getElementById('height').value);
            const a = parseFloat(document.getElementById('age').value);
            const g = document.getElementById('gender').value;
            const act = parseFloat(document.getElementById('activity').value);
            if(!w || !h || !a) return alert("عمر الخانات!");
            let bmr = (10 * w) + (6.25 * h) - (5 * a);
            bmr = (g === 'male') ? bmr + 5 : bmr - 161;
            const tdee = Math.round(bmr * act);
            document.getElementById('res-tdee').innerText = tdee;
            document.getElementById('p-prot').innerText = Math.round((tdee*0.3)/4) + "g";
            document.getElementById('p-fat').innerText = Math.round((tdee*0.35)/9) + "g";
            document.getElementById('p-carb').innerText = Math.round((tdee*0.35)/4) + "g";
            document.getElementById('results').classList.remove('hidden');
        }
    </script>
</body>
</html>
