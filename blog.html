<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>المدونة | TDEE Arabia</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"><style>body{font-family:'Cairo'} .hidden{display:none}</style></head>
        <body class="bg-slate-50">
            <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm p-6 text-right"><div class="max-w-6xl mx-auto flex justify-between items-center"><h1 class="text-2xl font-black text-blue-600">TDEE ARABIA 🔥</h1><a href="/" class="font-bold text-slate-600">الرئيسية</a></div></nav>
            <main class="max-w-6xl mx-auto px-4 mt-10">
                <div class="text-center mb-12">
                    <h2 class="text-5xl font-black text-slate-900 mb-6 italic text-center">المدونة الرياضية</h2>
                    <div class="flex justify-center"><input type="text" id="searchInput" placeholder="ابحث عن مقال..." class="px-6 py-4 rounded-2xl border-2 border-slate-200 focus:border-blue-500 outline-none w-full max-w-md shadow-lg mb-8 text-right"></div>
                    <div class="flex flex-wrap justify-center gap-3">
                        <button onclick="filterBlog('all')" class="bg-slate-900 text-white px-8 py-2 rounded-full font-bold shadow-md">الكل</button>
                        <button onclick="filterBlog('تنشيف')" class="bg-white border px-8 py-2 rounded-full font-bold hover:bg-blue-600 hover:text-white transition-all">تنشيف</button>
                        <button onclick="filterBlog('تضخيم')" class="bg-white border px-8 py-2 rounded-full font-bold hover:bg-blue-600 hover:text-white transition-all">تضخيم</button>
                    </div>
                </div>
                <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-32">
                    
                    
    <div class="blog-card bg-white rounded-[2.5rem] shadow-xl overflow-hidden hover:scale-105 transition-all duration-500 border border-slate-100 group" data-category="تنشيف">
        <div class="relative overflow-hidden h-64">
            <img src="https://loremflickr.com/1200/800/gym,fitness,bodybuilding/all?lock=14036" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="حرق دهون البطن لوزن 63 كجم">
            <div class="absolute top-4 right-4 bg-blue-600 text-white text-xs font-bold px-4 py-1 rounded-full shadow-lg">تنشيف</div>
        </div>
        <div class="p-8 text-right">
            <span class="text-blue-500 font-bold text-sm">2026-05-12</span>
            <h3 class="post-title text-2xl font-black mt-3 mb-6 text-slate-900 leading-tight h-24 overflow-hidden text-right">حرق دهون البطن لوزن 63 كجم</h3>
            <a href="./post-73082.html" class="inline-block w-full text-center bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-blue-600 transition-all shadow-lg">قراءة المقال ←</a>
        </div>
    </div>
                </div>
            </main>
            <script>
                function filterBlog(cat) {
                    document.querySelectorAll('.blog-card').forEach(c => {
                        c.style.display = (cat === 'all' || c.dataset.category === cat) ? 'block' : 'none';
                    });
                }
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const t = e.target.value.toLowerCase();
                    document.querySelectorAll('.blog-card').forEach(c => {
                        const title = c.querySelector('.post-title').innerText.toLowerCase();
                        c.style.display = title.includes(t) ? 'block' : 'none';
                    });
                });
            </script>
        </body></html>
