name: Auto Post & Deploy
on:
  schedule:
    - cron: '0 */8 * * *' # كل 8 ساعات
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install groq requests
      
      - name: Run Generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generator.py
      
      - name: Push Changes
        run: |
          git config --global user.name "Mohamed-Admin"
          git config --global user.email "admin@tdee-arabia.com"
          git add .
          git commit -m "🚀 Automated Update [deploy]" || echo "No changes"
          git push origin main

      - name: Wake up Vercel
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
