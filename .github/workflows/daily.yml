name: Auto Post & Deploy
on:
  schedule:
    - cron: '0 */8 * * *' # كل 8 ساعات
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install groq requests
      
      - name: Run Generator Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: python generator.py
      
      - name: Push Changes as User
        run: |
          # هنا كنغيرو الهوية باش Vercel يقبل التحديث
          git config --global user.name "Mohamed Admin"
          git config --global user.email "admin@tdee-arabia.com"
          git add .
          git commit -m "🚀 New Post: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push origin main

      - name: Force Vercel Deployment
        if: success()
        run: |
          # أمر صريح لـ Vercel باش يبدا الـ Build
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
