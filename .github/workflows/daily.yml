name: Auto Post & Deploy
on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install groq requests
      
      - name: Run Generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: python generator.py
      
      - name: Push Changes
        run: |
          git config --global user.name "Mohamed Admin"
          git config --global user.email "admin@tdee-arabia.com"
          git add .
          git commit -m "🚀 New Automated Post [vcp]" || echo "No changes to commit"
          git push origin main

      - name: Trigger Vercel
        if: success()
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
