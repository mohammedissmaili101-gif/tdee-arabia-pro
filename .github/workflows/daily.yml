name: Auto Post & Deploy
on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # مهم باش يقدّر يدير git push بلا مشاكل

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq requests
      
      - name: Run Generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generator.py
      
      - name: Push Changes
        run: |
          git config --global user.name "Mohamed-Admin"
          git config --global user.email "admin@tdee-arabia.com"
          git add .
          # كنزيدو هاد الشرط باش إلا ما كان حتى ملف جديد ميوقفش الـ Action بـ Error
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🚀 Automated Update [deploy]"
            git push origin main
          fi
          sleep 5

      - name: Wake up Vercel
        # هاد الخطوة غتخدم غير إلا كان عندك Deploy Hook من Vercel
        if: success() && secrets.VERCEL_DEPLOY_HOOK != ''
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
